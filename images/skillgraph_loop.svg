<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde7d3"/>
      <stop offset="100%" stop-color="#f4b27a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6e8fb"/>
      <stop offset="100%" stop-color="#7eb3e8"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcefdc"/>
      <stop offset="100%" stop-color="#7fc08a"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecdcf5"/>
      <stop offset="100%" stop-color="#b78de0"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="#ffffff"/>

  <!-- Top-left: Human Demonstration -->
  <g>
    <rect x="40" y="30" width="200" height="90" rx="14" ry="14" fill="url(#g1)" stroke="#a86b2e" stroke-width="1.5"/>
    <!-- Person icon -->
    <circle cx="75" cy="60" r="8" fill="#5a3010"/>
    <path d="M62,86 Q75,70 88,86 L88,96 L62,96 Z" fill="#5a3010"/>
    <text x="160" y="65" text-anchor="middle" font-size="16" font-weight="600" fill="#3a2208">Human</text>
    <text x="160" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#3a2208">Demonstration</text>
    <text x="160" y="105" text-anchor="middle" font-size="11" fill="#3a2208" font-style="italic">(Task Specification)</text>
  </g>

  <!-- Top-right: Skill Graph -->
  <g>
    <rect x="400" y="30" width="200" height="90" rx="14" ry="14" fill="url(#g2)" stroke="#235a91" stroke-width="1.5"/>
    <!-- Mini graph icon -->
    <g stroke="#0f3661" stroke-width="1.8" fill="#0f3661">
      <line x1="430" y1="55" x2="455" y2="75"/>
      <line x1="455" y1="75" x2="438" y2="100"/>
      <line x1="455" y1="75" x2="480" y2="95"/>
      <line x1="438" y1="100" x2="480" y2="95"/>
      <circle cx="430" cy="55" r="4"/>
      <circle cx="455" cy="75" r="4"/>
      <circle cx="438" cy="100" r="4"/>
      <circle cx="480" cy="95" r="4"/>
    </g>
    <text x="540" y="70" text-anchor="middle" font-size="16" font-weight="600" fill="#0f3661">Skill</text>
    <text x="540" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#0f3661">Graph</text>
  </g>

  <!-- Bottom-right: Data Collection -->
  <g>
    <rect x="400" y="240" width="200" height="90" rx="14" ry="14" fill="url(#g3)" stroke="#2e7038" stroke-width="1.5"/>
    <!-- Database icon -->
    <g fill="#1c4a25" stroke="#1c4a25">
      <ellipse cx="440" cy="263" rx="16" ry="5"/>
      <path d="M424,263 L424,305 Q424,310 440,310 Q456,310 456,305 L456,263" fill="none" stroke-width="2"/>
      <ellipse cx="440" cy="277" rx="16" ry="5" fill="none" stroke-width="1.5"/>
      <ellipse cx="440" cy="291" rx="16" ry="5" fill="none" stroke-width="1.5"/>
    </g>
    <text x="525" y="280" text-anchor="middle" font-size="16" font-weight="600" fill="#173d1e">Data</text>
    <text x="525" y="300" text-anchor="middle" font-size="16" font-weight="600" fill="#173d1e">Collection</text>
  </g>

  <!-- Bottom-left: Planner -->
  <g>
    <rect x="40" y="240" width="200" height="90" rx="14" ry="14" fill="url(#g4)" stroke="#6a3892" stroke-width="1.5"/>
    <!-- Path/planning icon -->
    <g stroke="#3d1f5c" stroke-width="2.2" fill="none">
      <path d="M60,300 Q80,255 105,280 Q130,305 155,260"/>
      <circle cx="60" cy="300" r="4" fill="#3d1f5c"/>
      <circle cx="155" cy="260" r="4" fill="#3d1f5c"/>
    </g>
    <text x="200" y="290" text-anchor="middle" font-size="16" font-weight="600" fill="#3d1f5c">Planner</text>
  </g>

  <!-- Curved arrows forming a clockwise loop -->
  <g fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)">
    <!-- Top-left -> Top-right -->
    <path d="M 250,75 L 390,75"/>
    <!-- Top-right -> Bottom-right -->
    <path d="M 500,130 L 500,230"/>
    <!-- Bottom-right -> Bottom-left -->
    <path d="M 390,285 L 250,285"/>
    <!-- Bottom-left -> Top-left -->
    <path d="M 140,230 L 140,130"/>
  </g>

  <!-- Center label -->
  <g>
    <text x="320" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#555" letter-spacing="1.5">AUTONOMOUS</text>
    <text x="320" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#555" letter-spacing="1.5">IMPROVEMENT</text>
    <text x="320" y="208" text-anchor="middle" font-size="11" fill="#888" font-style="italic">closed-loop</text>
  </g>
</svg>
